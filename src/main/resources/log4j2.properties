# Log4j2 configuration status
status = error
name = AutomationFramework

# Console Appender

appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.target = SYSTEM_OUT

appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5level %msg%n

# File Appender

appender.file.type = File
appender.file.name = FileAppender
appender.file.fileName = test-output/automation.log

appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5level %msg%n

# Root Logger

rootLogger.level = info
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = FileAppender

# Reduce noisy library logs

# WebDriverManager logs
logger.wdm.name = io.github.bonigarcia.wdm
logger.wdm.level = warn

# Freemarker logs (used internally by Extent Reports)
logger.freemarker.name = freemarker
logger.freemarker.level = error

# Selenium internal logs
logger.selenium.name = org.openqa.selenium
logger.selenium.level = warn